apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-auth-web
  namespace: lab3-auth-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simple-auth-web
  template:
    metadata:
      labels:
        app: simple-auth-web
    spec:
      containers:
        - name: simple-auth-web
          image: simple-auth-web:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
